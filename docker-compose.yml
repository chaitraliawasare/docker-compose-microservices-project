
services:

#run the dockerfile in same directory
  app:
   build: .
   #ports:
     #- "5001:5001"
   depends_on:
    - database
   networks:
    - backend

  database:
    image: postgres:16
    volumes:
      - ./data:/var/lib/postgresql
    environment:
       POSTGRES_USER: ${POSTGRES_USER}
       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
       POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - backend
  
  nginx:
    image: nginx
    depends_on:
      - app
      - database
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - backend
  
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend
  
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
  
  node_exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"
    networks:
      - backend
  
networks:
  backend:
    driver: bridge
    
volumes:
  grafana_data:
  
    