
services:

#run the dockerfile in same directory
  app:
   build: .
   #ports:
     #- "5001:5001"
   depends_on:
    - database
   networks:
    - backend

  database:
    image: postgres:16
    volumes:
      - ./data:/var/lib/postgresql
    environment:
       POSTGRES_USER: ${POSTGRES_USER}
       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
       POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - backend
  
  nginx:
    image: nginx
    depends_on:
      - app
      - database
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - backend
  
networks:
  backend:
    driver: bridge
  
    