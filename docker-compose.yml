
services:

#run the dockerfile in same directory
  app:
   build: .
   #ports:
     #- "5001:5001"
   depends_on:
    - database

  database:
    image: postgres
    volumes:
      - ./data:/var/lib/postgresql
    environment:
       POSTGRES_USER: admin
       POSTGRES_PASSWORD: password
       POSTGRES_DB: devopsdb
  
  nginx:
    image: nginx
    depends_on:
      - app
      - database
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    